<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT INVESTMENT | Login</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
</head>
<body class="main-bg">
    <div class="glass-container" style="max-width: 500px; padding: 45px;">
        <h1 class="logo-text">AMT <span>LOGIN</span></h1>
        <p style="text-align:center; font-size:13px; color:#64748b; margin-bottom:30px;">قم بتسجيل الدخول للوصول إلى أصولك الرقمية</p>
        
        <form id="loginForm">
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="loginCountry" style="width:40%; font-size:13px; cursor:pointer;">
                    <option value="+20">🇪🇬 +20</option>
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                    <option value="+964">🇮🇶 +964</option>
                    <option value="+44">🇬🇧 +44</option>
                    <option value="+1">🇺🇸 +1</option>
                </select>
                <input type="tel" id="loginPhone" placeholder="رقم الهاتف" required style="margin-bottom:0;">
            </div>

            <input type="password" id="loginPass" placeholder="كلمة السر المشفرة" required>
            
            <div style="text-align:left; margin-bottom:20px;">
                <a href="#" style="font-size:12px; color:var(--text-gray); text-decoration:none;">هل نسيت كلمة السر؟</a>
            </div>

            <button type="submit" class="btn-primary">دخول آمن للمنصة</button>
        </form>
        
        <div class="text-center mt-20">
            <p style="font-size:14px;">ليس لديك حساب؟ <a href="index.html" style="color:#2c3e50; font-weight:bold; text-decoration:none;">إنشاء حساب جديد</a></p>
        </div>

        <div class="footer-info">
            <span class="version-badge" onclick="triggerVault()">BUILD PROTOCOL v3.5.0</span>
        </div>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g",
          databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com",
          projectId: "matrix-c2",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.database();

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const country = document.getElementById('loginCountry').value;
            const phoneNum = document.getElementById('loginPhone').value;
            const passInput = document.getElementById('loginPass').value;
            
            const fullPhone = country + phoneNum;
            const userKey = fullPhone.replace('+', '');

            // البحث عن المستخدم في قاعدة البيانات
            db.ref('users/' + userKey).once('value', (snapshot) => {
                const userData = snapshot.val();
                
                if(userData) {
                    // تشفير الباسورد المدخل ومقارنته بالمشفر في الداتابيز
                    const encryptedInput = MatrixCrypto.encrypt(passInput);
                    
                    if(userData.password === encryptedInput) {
                        localStorage.setItem('userPhone', userKey);
                        alert("تم التحقق بنجاح. مرحباً بك في AMT.");
                        window.location.href = "dashboard.html";
                    } else {
                        alert("خطأ: كلمة السر غير صحيحة!");
                    }
                } else {
                    alert("خطأ: هذا الحساب غير مسجل لدينا.");
                }
            });
        };
    </script>
</body>
</html>
