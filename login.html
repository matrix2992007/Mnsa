<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT INVESTMENT | تسجيل الدخول</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
</head>
<body class="main-bg">
    <div class="glass-container">
        <h1 class="logo">AMT <span>LOGIN</span></h1>
        <p style="text-align:center; font-size:12px; color:#7f8c8d; margin-bottom:20px;">مرحباً بك مجدداً في محفظتك</p>
        
        <form id="loginForm">
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <select id="loginCountry" style="width:35%; border-radius:12px;">
                    <option value="+20">🇪🇬 +20</option>
                    <option value="+964">🇮🇶 +964</option>
                    <option value="+966">🇸🇦 +966</option>
                </select>
                <input type="tel" id="loginPhone" placeholder="رقم الهاتف" required style="margin-bottom:0;">
            </div>

            <div class="input-group">
                <input type="password" id="loginPass" placeholder="كلمة السر" required>
            </div>

            <button type="submit" class="btn-primary">دخول للمنصة</button>
        </form>
        
        <p style="text-align:center; margin-top:15px; font-size:13px;">ليس لديك حساب؟ <a href="index.html" style="color:#2c3e50; font-weight:bold; text-decoration:none;">إنشاء حساب جديد</a></p>
        
        <p class="version-text" onclick="triggerVault()">v1.0.8</p>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g",
          databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com",
          projectId: "matrix-c2",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const phone = document.getElementById('loginCountry').value + document.getElementById('loginPhone').value;
            const pass = document.getElementById('loginPass').value;
            const userKey = phone.replace('+', '');

            firebase.database().ref('users/' + userKey).once('value', (snapshot) => {
                const userData = snapshot.val();
                if(userData && userData.password === pass) {
                    localStorage.setItem('userPhone', userKey);
                    window.location.href = "dashboard.html";
                } else {
                    alert("خطأ في رقم الهاتف أو كلمة السر!");
                }
            });
        };
    </script>
</body>
</html>
