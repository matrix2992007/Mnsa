<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT | إيداع الرصيد</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
</head>
<body class="main-bg">
    <div class="glass-container">
        <h2 class="logo">شحن <span>المحفظة</span></h2>
        <p style="text-align:center; font-size:13px; color:#7f8c8d; margin-bottom:15px;">اختر وسيلة الدفع المناسبة لك</p>

        <div id="depositForm">
            <div class="input-group">
                <label style="font-size:12px; display:block; margin-bottom:5px;">اختر المحفظة المتاحة:</label>
                <select id="walletSelect" style="border-radius:12px;">
                    <option value="Vodafone Cash">فودافون كاش (010...)</option>
                    <option value="InstaPay">انستا باي (User@instapay)</option>
                    <option value="USDT TRC20">USDT (TRC20 Address)</option>
                    <option value="Binance Pay">Binance Pay ID</option>
                    <option value="Orange Money">أورنج كاش</option>
                    <option value="Etisalat Cash">اتصالات كاش</option>
                </select>
            </div>

            <div class="input-group">
                <input type="number" id="depositAmount" placeholder="المبلغ المراد شحنه ($)" required>
            </div>

            <div style="background:rgba(44, 62, 80, 0.05); padding:15px; border-radius:12px; margin-bottom:15px; text-align:center;">
                <p id="walletAddress" style="font-weight:bold; color:#2c3e50; font-size:14px; word-break:break-all;">اختر وسيلة دفع لرؤية الرقم</p>
                <button onclick="copyWallet()" style="background:#bdc3c7; border:none; padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer; margin-top:5px;">نسخ الرقم</button>
            </div>

            <p style="font-size:11px; color:#e74c3c; margin-bottom:10px;">* بعد التحويل، يرجى إرسال صورة التحويل لخدمة العملاء لتفعيل الرصيد.</p>

            <button onclick="sendDepositRequest()" class="btn-primary">تأكيد عملية التحويل</button>
            <button onclick="window.location.href='dashboard.html'" class="btn-primary" style="background:transparent; color:#2c3e50; border:1px solid #2c3e50; margin-top:8px;">إلغاء</button>
        </div>

        <p class="version-text" onclick="triggerVault()">v1.0.8</p>
    </div>

    <script>
        const wallets = {
            "Vodafone Cash": "01012345678", // حط أرقامك الحقيقية هنا
            "InstaPay": "yousef@instapay",
            "USDT TRC20": "TXXXXXXXXXXXXXXXXXXXXXXX",
            "Binance Pay": "998877665",
            "Orange Money": "01211223344",
            "Etisalat Cash": "01122334455"
        };

        const walletSelect = document.getElementById('walletSelect');
        const walletAddress = document.getElementById('walletAddress');

        walletSelect.onchange = () => {
            walletAddress.innerText = wallets[walletSelect.value];
        };

        function copyWallet() {
            navigator.clipboard.writeText(walletAddress.innerText);
            alert("تم نسخ العنوان/الرقم بنجاح");
        }

        async function sendDepositRequest() {
            const amount = document.getElementById('depositAmount').value;
            const method = walletSelect.value;
            const phone = localStorage.getItem('userPhone');

            if(!amount || amount <= 0) return alert("يرجى إدخال مبلغ صحيح");

            const botToken = "8619795327:AAF8hZQVZlyLkxYyU6bmuu2KVM2nyNUmpRE";
            const chatId = "8622780736"; 
            const msg = `💰 **طلب إيداع جديد!**\n📱 المستخدم: ${phone}\n💵 المبلغ: $${amount}\n💳 الوسيلة: ${method}`;

            try {
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                alert("تم إرسال طلبك! يرجى التواصل مع الإدارة لإتمام التفعيل.");
                window.location.href = "https://t.me/l0_D_0"; // يروح يكلمك عشان يبعت السكرين
            } catch(e) {
                alert("حدث خطأ، حاول مرة أخرى.");
            }
        }
    </script>
</body>
</html>
