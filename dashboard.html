<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT | Investor Dashboard</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="main-bg" style="display: block; padding: 15px;">

    <div class="glass-container section-wallet" style="padding:20px; margin-bottom:15px;">
        <p style="font-size:11px; color:var(--text-gray);">الرصيد المتاح للاستثمار</p>
        <h2 style="font-size:35px; color:var(--wallet-color);">$<span id="userBalance">0.00</span></h2>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="showSection('depositSection')" class="btn-primary" style="background:var(--wallet-color); font-size:12px; height:35px;">إيداع +</button>
            <button onclick="showSection('withdrawSection')" class="btn-primary" style="background:rgba(255,255,255,0.1); font-size:12px; height:35px;">سحب -</button>
        </div>
    </div>

    <div id="plansSection" class="glass-container section-trade" style="padding:20px; margin-bottom:15px;">
        <h3 style="color:var(--trade-color); margin-bottom:15px; font-size:16px;"><i class="fas fa-chart-line"></i> باقات الاستثمار المتاحة</h3>
        <div id="plansList" style="display:grid; grid-template-columns: 1fr; gap:10px;">
            </div>
    </div>

    <div id="depositSection" class="glass-container" style="display:none; padding:20px; margin-bottom:15px; border-top:3px solid var(--events-color);">
        <h3 style="color:var(--events-color);"><i class="fas fa-university"></i> وسائل الدفع المتاحة</h3>
        <div id="paymentMethods" style="margin-top:15px;">
            </div>
        <button onclick="showSection('plansSection')" style="background:none; border:none; color:var(--text-gray); margin-top:10px; font-size:12px;">إغلاق ×</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g", databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com", projectId: "matrix-c2" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userKey = localStorage.getItem('userPhone');

        // 1. تحديث الرصيد
        db.ref('users/' + userKey + '/balance').on('value', s => {
            document.getElementById('userBalance').innerText = (s.val() || 0).toFixed(2);
        });

        // 2. جلب الباقات والاشتراك
        db.ref('settings/plans').on('value', s => {
            const plans = s.val();
            const list = document.getElementById('plansList');
            list.innerHTML = "";
            for(let id in plans) {
                list.innerHTML += `
                    <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; border:1px solid rgba(0,255,136,0.2);">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <b style="font-size:14px;">استثمار $${plans[id].price}</b>
                                <p style="font-size:10px; color:var(--trade-color);">الربح المتوقع: $${plans[id].profit}</p>
                            </div>
                            <button onclick="buyPlan('${id}', ${plans[id].price})" class="btn-primary" style="width:80px; height:30px; font-size:11px; background:var(--trade-color); color:black;">اشترك</button>
                        </div>
                    </div>`;
            }
        });

        // 3. جلب وسائل الدفع يدوياً من الأدمن
        db.ref('settings/payments').on('value', s => {
            const methods = s.val();
            const container = document.getElementById('paymentMethods');
            container.innerHTML = "";
            for(let key in methods) {
                container.innerHTML += `
                    <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:8px;">
                        <p style="font-size:10px; color:var(--text-gray);">${key}</p>
                        <code style="font-size:11px; color:white; word-break:break-all;">${methods[key]}</code>
                        <button onclick="navigator.clipboard.writeText('${methods[key]}'); alert('تم نسخ العنوان')" style="float:left; background:none; border:none; color:var(--events-color); font-size:10px;">نسخ</button>
                        <div style="clear:both;"></div>
                    </div>`;
            }
        });

        function showSection(id) {
            document.getElementById('depositSection').style.display = (id === 'depositSection') ? 'block' : 'none';
        }

        function buyPlan(id, price) {
            db.ref('users/' + userKey + '/balance').once('value', s => {
                const bal = s.val() || 0;
                if(bal >= price) {
                    db.ref('users/' + userKey + '/balance').set(bal - price);
                    alert("✅ تم الاشتراك في الباقة بنجاح!");
                } else {
                    alert("❌ رصيدك غير كافي. يرجى الإيداع أولاً.");
                    showSection('depositSection');
                }
            });
        }
    </script>
</body>
</html>
