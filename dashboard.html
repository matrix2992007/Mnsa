<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT | Dashboard</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-content { display: none; padding-bottom: 80px; }
        .active-tab { display: block; animation: fadeIn 0.5s; }
        .nav-btn { background:none; border:none; color:var(--text-gray); font-size:20px; transition:0.3s; }
        .nav-btn.active { color:var(--trade-color); transform: scale(1.2); }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    </style>
</head>
<body class="main-bg" style="display:block; padding:15px;">

    <div class="glass-container" style="position:fixed; bottom:15px; left:5%; width:90%; height:65px; display:flex; justify-content:space-around; align-items:center; z-index:1000; border-radius:25px; border:1px solid rgba(255,255,255,0.1);">
        <button onclick="showTab('home', this)" class="nav-btn active"><i class="fas fa-home"></i></button>
        <button onclick="showTab('trade', this)" class="nav-btn"><i class="fas fa-chart-line"></i></button>
        <button onclick="showTab('exchange', this)" class="nav-btn"><i class="fas fa-sync-alt"></i></button>
        <button onclick="showTab('wallet', this)" class="nav-btn"><i class="fas fa-wallet"></i></button>
    </div>

    <div id="home" class="tab-content active-tab">
        <div class="glass-container section-wallet" style="padding:20px; margin-bottom:15px;">
            <p style="font-size:11px; color:var(--text-gray);">الرصيد الكلي</p>
            <h2 style="font-size:32px;">$<span id="mainBal">0.00</span></h2>
        </div>
        <div class="glass-container section-trade" style="padding:20px;">
            <h3 style="font-size:16px; margin-bottom:15px;"><i class="fas fa-bolt"></i> باقات الاستثمار المتاحة</h3>
            <div id="plansList"></div>
        </div>
    </div>

    <div id="trade" class="tab-content">
        <div class="glass-container" style="padding:20px;">
            <h3 style="color:var(--trade-color);">منصة التداول الحي</h3>
            <div style="background:rgba(0,0,0,0.4); border-radius:15px; padding:15px; margin:15px 0;">
                <p style="font-size:12px;">رصيد التداول: <b id="tradeBal">$0.00</b></p>
                <div style="height:120px; border-bottom:1px solid #333; margin-top:10px; display:flex; align-items:flex-end; gap:5px;">
                    <div style="flex:1; background:var(--trade-color); height:40%;"></div>
                    <div style="flex:1; background:var(--trade-color); height:70%;"></div>
                    <div style="flex:1; background:#ff5252; height:50%;"></div>
                    <div style="flex:1; background:var(--trade-color); height:90%;"></div>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="alert('جاري التحليل...')" class="btn-primary" style="background:#00c853; flex:1;">شراء (Long)</button>
                <button onclick="alert('جاري التحليل...')" class="btn-primary" style="background:#ff5252; flex:1;">بيع (Short)</button>
            </div>
        </div>
    </div>

    <div id="exchange" class="tab-content">
        <div class="glass-container" style="padding:20px;">
            <h3>تحويل العملات الداخلي</h3>
            <p style="font-size:10px; color:var(--text-gray); margin-bottom:15px;">حول بين المحفظة الرئيسية وحساب التداول</p>
            <input type="number" id="exAmt" placeholder="المبلغ ($)">
            <select id="exDirection">
                <option value="1">من الرئيسية إلى التداول</option>
                <option value="2">من التداول إلى الرئيسية</option>
            </select>
            <button onclick="processExchange()" class="btn-primary" style="background:var(--events-color); color:black;">تحويل داخلي فوري</button>
        </div>
    </div>

    <div id="wallet" class="tab-content">
        <div class="glass-container section-wallet" style="padding:20px;">
            <h3>المحفظة الرقمية</h3>
            <div id="depositMethods" style="margin-top:20px;">
                <p style="font-size:12px; margin-bottom:10px;">طرق الإيداع المتاحة (تواصل مع الأدمن بعد التحويل):</p>
                <div id="methodsList"></div>
            </div>
            <hr style="opacity:0.1; margin:20px 0;">
            <button onclick="openWithdraw()" class="btn-primary" style="background:var(--admin-color);">طلب سحب أرباح (Withdraw)</button>
        </div>
    </div>

    <div id="withdrawModal" class="glass-container" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:90%; z-index:2000; padding:20px; border:1px solid var(--admin-color);">
        <h3 style="color:var(--admin-color);">سحب الأموال</h3>
        <input type="number" id="wdAmt" placeholder="المبلغ ($)">
        <input type="text" id="wdAddr" placeholder="العنوان (USDT / CCP / فودافون)">
        <button onclick="submitWithdraw()" class="btn-primary" style="background:var(--admin-color);">إرسال الطلب</button>
        <button onclick="document.getElementById('withdrawModal').style.display='none'" style="background:none; border:none; color:white; width:100%; margin-top:10px;">إغلاق</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g", databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com", projectId: "matrix-c2" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userKey = localStorage.getItem('userPhone');

        if(!userKey) window.location.href = "login.html";

        // تحديث البيانات الحية
        db.ref('users/' + userKey).on('value', s => {
            const u = s.val();
            document.getElementById('mainBal').innerText = (u.balance || 0).toFixed(2);
            document.getElementById('tradeBal').innerText = "$" + (u.trading_balance || 0).toFixed(2);
        });

        // جلب الباقات
        db.ref('settings/plans').on('value', s => {
            const plans = s.val();
            const list = document.getElementById('plansList');
            list.innerHTML = "";
            for(let id in plans) {
                list.innerHTML += `<div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(0,200,83,0.2);">
                    <div><b>باقة $${plans[id].price}</b><br><small style="color:var(--trade-color);">ربح متوقع: $${plans[id].profit}</small></div>
                    <button onclick="buyPlan(${plans[id].price})" class="btn-primary" style="width:70px; height:30px; font-size:11px; background:var(--trade-color); color:black;">اشتراك</button>
                </div>`;
            }
        });

        // جلب طرق الإيداع
        db.ref('settings/payments').on('value', s => {
            const pays = s.val();
            const list = document.getElementById('methodsList');
            list.innerHTML = "";
            for(let n in pays) {
                list.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; margin-bottom:8px;">
                    <small style="color:var(--text-gray);">${n}</small><br>
                    <code style="font-size:11px;">${pays[n]}</code>
                </div>`;
            }
        });

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            btn.classList.add('active');
        }

        function openWithdraw() { document.getElementById('withdrawModal').style.display='block'; }

        function submitWithdraw() {
            const amt = parseFloat(document.getElementById('wdAmt').value);
            const addr = document.getElementById('wdAddr').value;
            if(!amt || !addr) return alert("أكمل البيانات!");
            db.ref('withdraw_requests').push({ user: userKey, amount: amt, address: addr, status: "pending", date: new Date().toLocaleString() });
            alert("✅ تم إرسال طلب السحب للأدمن!");
            document.getElementById('withdrawModal').style.display='none';
        }

        function processExchange() {
            const amt = parseFloat(document.getElementById('exAmt').value);
            const dir = document.getElementById('exDirection').value;
            if(!amt) return;
            // منطق التحويل الداخلي بالفايربيز (خصم من جهة وإضافة لجهة)
            alert("✅ تم طلب التحويل، سيتم المعالجة فوراً.");
        }
    </script>
</body>
</html>
