<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT | لوحة التحكم</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-content { display: none; animation: slideUp 0.4s ease; padding-bottom: 100px; }
        .active-tab { display: block; }
        .nav-bar { position: fixed; bottom: 20px; left: 5%; width: 90%; height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; border: 1px solid rgba(178,255,89,0.2); }
        .nav-item { color: #888; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #b2ff59; transform: translateY(-5px); text-shadow: 0 0 10px #b2ff59; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .plan-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; margin-bottom: 15px; }
    </style>
</head>
<body class="main-bg" style="display:block; padding:20px;">

    <div class="glass-container" style="padding:20px; margin-bottom:20px; border-right: 4px solid #b2ff59;">
        <h3 id="userNameDisplay" style="font-size:18px;">جاري التعرف عليك...</h3>
        <p style="font-size:11px; color:#aaa;">رصيدك المتوفر للاستثمار:</p>
        <h2 style="font-size:35px; color:#fff;">$<span id="userBalance">0.00</span></h2>
    </div>

    <div id="home" class="tab-content active-tab">
        <h4 style="margin-bottom:15px; color:#b2ff59;"><i class="fas fa-chart-pie"></i> خطط الاستثمار النشطة</h4>
        <div id="plansList"></div>
    </div>

    <div id="deposit" class="tab-content">
        <div class="glass-container" style="padding:20px;">
            <h4><i class="fas fa-wallet"></i> شحن المحفظة</h4>
            <p style="font-size:11px; color:#aaa; margin-bottom:20px;">اختر وسيلة الدفع وانسخ العنوان، ثم أرسل الإثبات في الشات.</p>
            <div id="paymentMethods"></div>
            
            <hr style="opacity:0.1; margin:20px 0;">
            
            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:15px;">
                <p style="font-size:12px; color:#b2ff59; margin-bottom:10px;"><i class="fas fa-comments"></i> دردشة تأكيد الإيداع</p>
                <div id="chatDisplay" style="height:120px; overflow-y:auto; font-size:11px; margin-bottom:10px;"></div>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="chatInput" placeholder="أرسل رابط الصورة أو رسالة..." style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:8px; border-radius:10px; font-size:11px;">
                    <button onclick="sendMsg()" style="background:#b2ff59; border:none; padding:0 15px; border-radius:10px; color:#000;"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="support" class="tab-content" style="text-align:center; padding-top:50px;">
        <i class="fab fa-telegram" style="font-size:80px; color:#0088cc;"></i>
        <h2>الدعم الفني المباشر</h2>
        <p style="color:#aaa; font-size:14px; margin:20px 0;">تواصل معنا عبر تليجرام لحل أي مشكلة فوراً</p>
        <a href="https://t.me/l_I_Z_N" target="_blank" class="btn-primary" style="background:#0088cc; text-decoration:none; display:inline-block; width:200px;">فتح محادثة</a>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showTab('home', this)"><i class="fas fa-th-large"></i></div>
        <div class="nav-item" onclick="showTab('deposit', this)"><i class="fas fa-plus-circle"></i></div>
        <div class="nav-item" onclick="showTab('support', this)"><i class="fas fa-headset"></i></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g", databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com", projectId: "matrix-c2" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userKey = localStorage.getItem('userPhone');

        if(!userKey) window.location.href = "login.html";

        // 1. جلب بيانات اليوزر والترحيب
        db.ref('users/' + userKey).on('value', s => {
            const u = s.val();
            if(u) {
                const name = MatrixCrypto.decrypt(u.full_name);
                document.getElementById('userNameDisplay').innerHTML = `أهلاً بك يا <span style="color:#b2ff59;">${name}</span> 👋`;
                document.getElementById('userBalance').innerText = (u.balance || 0).toFixed(2);
            }
        });

        // 2. جلب الباقات مع عداد المشتركين
        db.ref('settings/plans').on('value', s => {
            const plans = s.val();
            const list = document.getElementById('plansList');
            list.innerHTML = "";
            for(let id in plans) {
                list.innerHTML += `
                <div class="plan-card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="font-size:16px;">باقة استثمار $${plans[id].price}</b><br>
                            <small style="color:#b2ff59;">الربح: +$${plans[id].profit}</small>
                        </div>
                        <button class="btn-primary" style="width:80px; height:35px; font-size:11px; background:#b2ff59; color:#000;">اشتراك</button>
                    </div>
                    <div style="margin-top:10px; font-size:10px; color:#666;">
                        <i class="fas fa-users"></i> يشارك فيها حالياً: <b style="color:#aaa;">${plans[id].subscribers || 0} مستثمر</b>
                    </div>
                </div>`;
            }
        });

        // 3. جلب وسائل الدفع مع نظام العداد
        db.ref('settings/payments').on('value', s => {
            const pays = s.val();
            const container = document.getElementById('paymentMethods');
            container.innerHTML = "";
            for(let name in pays) {
                container.innerHTML += `
                <div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:15px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.1);">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <b>${name}</b>
                        <span style="font-size:9px; color:#0088cc;">موثوقة <i class="fas fa-check-circle"></i></span>
                    </div>
                    <code id="addr_${name}" style="font-size:10px; display:block; margin:8px 0; color:#b2ff59;">${pays[name].address}</code>
                    <button onclick="copyAndTrack('${name}')" style="background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:10px; padding:5px 10px; border-radius:5px; width:100%;">نسخ العنوان <i class="fas fa-copy"></i></button>
                </div>`;
            }
        });

        function copyAndTrack(name) {
            const text = document.getElementById('addr_'+name).innerText;
            navigator.clipboard.writeText(text);
            db.ref('settings/payments/' + name + '/useCount').transaction(c => (c || 0) + 1);
            alert("✅ تم نسخ العنوان. أرسل الإثبات في الشات بالأسفل.");
        }

        // 4. نظام الشات
        function sendMsg() {
            const m = document.getElementById('chatInput').value;
            if(!m) return;
            db.ref('chats/' + userKey).push({ sender: "user", text: m, time: new Date().toLocaleTimeString() });
            document.getElementById('chatInput').value = "";
        }

        db.ref('chats/' + userKey).on('value', s => {
            const box = document.getElementById('chatDisplay');
            box.innerHTML = "";
            s.forEach(c => {
                const m = c.val();
                const color = m.sender === "user" ? "#aaa" : "#b2ff59";
                box.innerHTML += `<div style="margin-bottom:5px; color:${color}"><b>${m.sender}:</b> ${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            el.classList.add('active');
        }
    </script>
</body>
</html>
