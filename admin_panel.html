<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AMT | Matrix Admin Panel</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body style="display: block; overflow-y: auto; padding: 20px; background: #f0f2f5;">
    
    <div style="max-width: 800px; margin: 0 auto;">
        <header style="display:flex; justify-content:space-between; align-items:center; background:#2c3e50; color:#fff; padding:20px; border-radius:15px; margin-bottom:20px;">
            <h2 style="margin:0;">لوحة تحكم AMT</h2>
            <button onclick="window.location.href='dashboard.html'" style="background:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">خروج</button>
        </header>

        <div id="usersContainer">
            <p style="text-align:center;">جاري جلب قائمة المستثمرين...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g",
          databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com",
          projectId: "matrix-c2",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.database();

        // جلب كل المستخدمين
        db.ref('users').on('value', (snapshot) => {
            const container = document.getElementById('usersContainer');
            container.innerHTML = "";
            const users = snapshot.val();

            for (let id in users) {
                const user = users[id];
                const userCard = `
                    <div style="background:#fff; border-radius:15px; padding:20px; margin-bottom:15px; box-shadow:0 5px 15px rgba(0,0,0,0.05); border:1px solid #eee;">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>👤 ${user.full_name}</strong>
                            <span style="color:#2ecc71; font-weight:bold;">رصيد: $${user.balance || 0}</span>
                        </div>
                        <p style="font-size:12px; color:#7f8c8d; margin:5px 0;">📱 هاتف: ${user.phone} | 🔑 باسورد: ${user.password}</p>
                        <hr style="border:0; border-top:1px solid #eee; margin:10px 0;">
                        
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                            <div>
                                <label style="font-size:11px;">تعديل الرصيد:</label>
                                <input type="number" id="bal_${id}" placeholder="المبلغ الجديد" style="margin-bottom:5px; padding:5px;">
                                <button onclick="updateBalance('${id}')" style="width:100%; background:#2c3e50; color:#fff; border:none; padding:5px; border-radius:5px; cursor:pointer;">تحديث</button>
                            </div>
                            <div>
                                <label style="font-size:11px;">إضافة مهمة (يدوي):</label>
                                <input type="text" id="task_${id}" placeholder="اكتب المهمة هنا" style="margin-bottom:5px; padding:5px;">
                                <button onclick="addTask('${id}')" style="width:100%; background:#27ae60; color:#fff; border:none; padding:5px; border-radius:5px; cursor:pointer;">إضافة مهمة</button>
                            </div>
                        </div>
                        <button onclick="deleteUser('${id}')" style="margin-top:10px; width:100%; background:#e74c3c; color:#fff; border:none; padding:5px; border-radius:5px; cursor:pointer; font-size:11px;">حذف المستخدم نهائياً</button>
                    </div>
                `;
                container.innerHTML += userCard;
            }
        });

        // دالة تحديث الرصيد
        function updateBalance(id) {
            const newBal = document.getElementById('bal_'+id).value;
            if(newBal === "") return alert("ادخل المبلغ");
            db.ref('users/'+id).update({ balance: parseFloat(newBal) })
              .then(() => alert("تم تحديث رصيد " + id));
        }

        // دالة إضافة المهام
        function addTask(id) {
            const taskText = document.getElementById('task_'+id).value;
            if(taskText === "") return alert("ادخل نص المهمة");
            
            db.ref('users/'+id+'/tasks').once('value', (snap) => {
                let currentTasks = snap.val() || [];
                currentTasks.push(taskText);
                db.ref('users/'+id).update({ tasks: currentTasks })
                  .then(() => {
                      alert("تمت إضافة المهمة بنجاح");
                      document.getElementById('task_'+id).value = "";
                  });
            });
        }

        // دالة الحذف
        function deleteUser(id) {
            if(confirm("هل أنت متأكد من حذف هذا المستخدم؟")) {
                db.ref('users/'+id).remove();
            }
        }
    </script>
</body>
</html>
