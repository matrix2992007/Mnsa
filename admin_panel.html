<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AMT | Master Admin Control v9.0</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: block; padding: 15px; overflow-y: auto; background: #0a0a0a; color: #fff; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        h4 { border-bottom: 1px solid #b2ff59; padding-bottom: 5px; color: #b2ff59; font-size: 14px; margin-bottom: 15px; }
        .user-row { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .chat-alert { background: #0088cc; color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 9px; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 class="logo-text">AMT <span>MASTER</span></h2>
        <a href="https://t.me/l_I_Z_N" target="_blank" style="color:#0088cc; text-decoration:none; font-size:12px;"><i class="fab fa-telegram"></i> @l_I_Z_N</a>
    </div>

    <div class="grid-stats">
        <div class="stat-card">
            <p style="font-size:10px; opacity:0.6;">إجمالي المستثمرين</p>
            <h3 id="totalUsers">0</h3>
        </div>
        <div class="stat-card">
            <p style="font-size:10px; opacity:0.6;">طلبات سحب معلقة</p>
            <h3 id="pendingWd" style="color:#ff5252;">0</h3>
        </div>
    </div>

    <div class="stat-card">
        <h4><i class="fas fa-chart-pie"></i> تحليل وسائل الإيداع (عدد النقرات)</h4>
        <div id="paymentStats" style="display:flex; flex-wrap:wrap; gap:10px;">
            </div>
    </div>

    <div class="stat-card">
        <h4><i class="fas fa-layer-group"></i> الباقات النشطة والمشتركين</h4>
        <div id="plansStats">
            </div>
    </div>

    <div class="stat-card">
        <h4><i class="fas fa-comments"></i> مركز الدعم والشات المباشر</h4>
        <div id="adminChats" style="max-height:300px; overflow-y:auto;">
            <p style="font-size:11px; opacity:0.5;">لا يوجد محادثات نشطة حالياً...</p>
        </div>
    </div>

    <div class="stat-card">
        <h4><i class="fas fa-user-edit"></i> إدارة الحسابات والأرصدة</h4>
        <div id="usersList"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g", databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com", projectId: "matrix-c2" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 1. تحديث إحصائيات المستخدمين ---
        db.ref('users').on('value', s => {
            const users = s.val() || {};
            document.getElementById('totalUsers').innerText = Object.keys(users).length;
            
            const list = document.getElementById('usersList');
            list.innerHTML = "";
            for(let id in users) {
                const name = MatrixCrypto.decrypt(users[id].full_name);
                list.innerHTML += `
                    <div class="user-row">
                        <div style="font-size:10px;"><b>${name}</b><br><small>${id}</small></div>
                        <div style="display:flex; gap:5px;">
                            <input type="number" id="bal_${id}" value="${users[id].balance}" style="width:50px; background:#222; color:#fff; border:1px solid #444; border-radius:5px; padding:2px;">
                            <button onclick="updateBalance('${id}')" style="background:#b2ff59; border:none; border-radius:5px; padding:5px; color:#000;"><i class="fas fa-save"></i></button>
                        </div>
                    </div>`;
            }
        });

        // --- 2. تحديث إحصائيات وسائل الدفع ---
        db.ref('settings/payments').on('value', s => {
            const pays = s.val() || {};
            const container = document.getElementById('paymentStats');
            container.innerHTML = "";
            for(let name in pays) {
                container.innerHTML += `
                    <div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:10px; font-size:10px; border-bottom:2px solid #0088cc;">
                        <b>${name}</b>: <span style="color:#b2ff59;">${pays[name].useCount || 0} طلب</span>
                    </div>`;
            }
        });

        // --- 3. إحصائيات الباقات ---
        db.ref('settings/plans').on('value', s => {
            const plans = s.val() || {};
            const container = document.getElementById('plansStats');
            container.innerHTML = "";
            for(let id in plans) {
                container.innerHTML += `
                    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px; background:rgba(0,0,0,0.2); padding:8px; border-radius:8px;">
                        <span>باقة $${plans[id].price}</span>
                        <span style="color:#b2ff59;">المشتركين: ${plans[id].subscribers || 0} مستثمر</span>
                    </div>`;
            }
        });

        // --- 4. إدارة الشات ---
        db.ref('chats').on('value', s => {
            const chats = s.val() || {};
            const container = document.getElementById('adminChats');
            container.innerHTML = "";
            for(let uid in chats) {
                const lastMsg = Object.values(chats[uid]).pop();
                container.innerHTML += `
                    <div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:10px; margin-bottom:8px;">
                        <div style="display:flex; justify-content:space-between;">
                            <small style="color:#b2ff59;">ID: ${uid}</small>
                            <span class="chat-alert">رسالة جديدة</span>
                        </div>
                        <p style="font-size:11px; margin:5px 0;">${lastMsg.text}</p>
                        <div style="display:flex; gap:5px;">
                            <input type="text" id="reply_${uid}" placeholder="اكتب ردك هنا..." style="flex:1; background:#000; color:#fff; border:1px solid #333; padding:5px; border-radius:5px; font-size:11px;">
                            <button onclick="sendReply('${uid}')" style="background:#0088cc; color:#fff; border:none; border-radius:5px; padding:5px 15px;">رد</button>
                        </div>
                    </div>`;
            }
        });

        // وظائف الأزرار
        function updateBalance(id) {
            const val = parseFloat(document.getElementById('bal_'+id).value);
            db.ref('users/'+id+'/balance').set(val);
            alert("✅ تم تحديث الرصيد بنجاح!");
        }

        function sendReply(uid) {
            const txt = document.getElementById('reply_'+uid).value;
            if(!txt) return;
            db.ref('chats/'+uid).push({ sender: "Admin", text: txt, time: new Date().toLocaleTimeString() });
            document.getElementById('reply_'+uid).value = "";
            alert("تم إرسال الرد!");
        }

        function addPayment(n, v) {
            db.ref('settings/payments/'+n).set({ address: v, useCount: 0 });
        }
    </script>
</body>
</html>
