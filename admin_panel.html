<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AMT | Matrix Admin Panel v3.5</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: block; overflow-y: auto; padding: 20px; background: #0f172a;">
    
    <div style="max-width: 900px; margin: 0 auto;">
        <header style="background:var(--admin-color); color:#fff; padding:25px; border-radius:20px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 10px 30px rgba(239, 68, 68, 0.2);">
            <div>
                <h2 style="margin:0;"><i class="fas fa-user-shield"></i> لوحة تحكم AMT Matrix</h2>
                <small style="opacity:0.8;">إدارة 50 مستثمر دولي | بروتوكول مشفر</small>
            </div>
            <button onclick="window.location.href='dashboard.html'" style="background:rgba(255,255,255,0.2); border:none; color:#fff; padding:10px 20px; border-radius:10px; cursor:pointer;">خروج آمن</button>
        </header>

        <div style="background:#fff; padding:20px; border-radius:15px; margin-bottom:20px; display:flex; gap:10px;">
            <input type="text" id="adminSearch" placeholder="ابحث بالـ ID أو رقم الهاتف..." style="margin:0; flex-grow:2;">
            <button onclick="filterUsers()" class="btn-primary" style="margin:0; width:auto; padding:0 25px; background:var(--admin-color);">بحث</button>
        </div>

        <div style="background:#fff; padding:20px; border-radius:15px; margin-bottom:20px; border-right:5px solid var(--events-color);">
            <h4 style="margin-bottom:10px;"><i class="fas fa-bullhorn"></i> نشر حدث جديد للمنصة:</h4>
            <div style="display:flex; gap:10px;">
                <input type="text" id="globalEvent" placeholder="اكتب تفاصيل الحدث هنا..." style="margin:0;">
                <button onclick="pushEvent()" class="btn-primary" style="margin:0; width:150px; background:var(--events-color);">نشر الآن</button>
            </div>
        </div>

        <div id="adminUsersList">
            <p style="text-align:center; color:#fff;">جاري فك تشفير بيانات المستثمرين...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g",
          databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com",
          projectId: "matrix-c2",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allUsers = {};

        // جلب البيانات ومعالجتها
        db.ref('users').on('value', (snapshot) => {
            allUsers = snapshot.val() || {};
            renderUsers(allUsers);
        });

        function renderUsers(users) {
            const container = document.getElementById('adminUsersList');
            container.innerHTML = "";

            for (let phone in users) {
                const user = users[phone];
                // فك تشفير الاسم لعرضه للأدمن
                const realName = MatrixCrypto.decrypt(user.full_name);
                
                const card = document.createElement('div');
                card.style = "background:#fff; border-radius:18px; padding:20px; margin-bottom:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);";
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div>
                            <span style="background:#f1f5f9; padding:4px 8px; border-radius:6px; font-size:10px; font-weight:bold; color:var(--admin-color);">${user.id || 'NO-ID'}</span>
                            <h3 style="margin:5px 0; color:var(--home-color);">${realName}</h3>
                            <p style="font-size:12px; color:var(--text-gray);">📱 ${user.phone} | 🔑 <span style="color:var(--admin-color); font-family:monospace;">${MatrixCrypto.decrypt(user.password)}</span></p>
                        </div>
                        <div style="text-align:left;">
                            <h2 style="margin:0; color:var(--trade-color);">$${user.balance || 0}</h2>
                            <small style="color:var(--text-gray);">الرصيد الحالي</small>
                        </div>
                    </div>
                    <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div>
                            <input type="number" id="amt_${phone}" placeholder="تعديل الرصيد" style="padding:8px; font-size:12px;">
                            <button onclick="updateUserBal('${phone}')" style="width:100%; padding:8px; background:var(--home-color); color:#fff; border:none; border-radius:8px; cursor:pointer;">تحديث الرصيد</button>
                        </div>
                        <div>
                            <input type="text" id="task_${phone}" placeholder="أضف مهمة خاصة" style="padding:8px; font-size:12px;">
                            <button onclick="addUserTask('${phone}')" style="width:100%; padding:8px; background:var(--wallet-color); color:#fff; border:none; border-radius:8px; cursor:pointer;">إضافة مهمة</button>
                        </div>
                    </div>
                    <button onclick="deleteUser('${phone}')" style="margin-top:15px; width:100%; background:none; border:1px solid #ff000022; color:red; padding:5px; border-radius:8px; font-size:11px; cursor:pointer;">حذف الحساب نهائياً</button>
                `;
                container.appendChild(card);
            }
        }

        // فلترة المستخدمين
        function filterUsers() {
            const query = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = {};
            for (let p in allUsers) {
                const name = MatrixCrypto.decrypt(allUsers[p].full_name).toLowerCase();
                if (p.includes(query) || name.includes(query) || (allUsers[p].id && allUsers[p].id.toLowerCase().includes(query))) {
                    filtered[p] = allUsers[p];
                }
            }
            renderUsers(filtered);
        }

        function updateUserBal(phone) {
            const val = document.getElementById('amt_'+phone).value;
            if(!val) return;
            db.ref('users/'+phone).update({ balance: parseFloat(val) });
        }

        function addUserTask(phone) {
            const task = document.getElementById('task_'+phone).value;
            if(!task) return;
            db.ref('users/'+phone+'/tasks').once('value', s => {
                let tasks = s.val() || [];
                tasks.push(task);
                db.ref('users/'+phone).update({ tasks: tasks }).then(()=>alert("تمت الإضافة"));
            });
        }

        function pushEvent() {
            const msg = document.getElementById('globalEvent').value;
            if(!msg) return;
            // يمكنك تخزين الأحداث في نود منفصل في الفايربيز لعرضها لكل المستخدمين
            alert("تم إرسال الحدث لشبكة AMT");
        }

        function deleteUser(phone) {
            if(confirm("حذف المستخدم؟ لا يمكن التراجع!")) db.ref('users/'+phone).remove();
        }
    </script>
</body>
</html>
