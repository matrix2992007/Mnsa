<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AMT | Master Admin</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
</head>
<body class="main-bg" style="display: block; padding: 20px;">
    
    <h2 style="color:var(--admin-color); margin-bottom:20px;"><i class="fas fa-tools"></i> لوحة التحكم الكاملة</h2>

    <div class="glass-container section-admin" style="padding:20px; margin-bottom:15px;">
        <h4><i class="fas fa-robot"></i> إعدادات البوت والروابط</h4>
        <input type="text" id="botToken" placeholder="أدخل توكن البوت (Telegram Token)">
        <input type="text" id="botUsername" placeholder="يوزر البوت (بدون @)">
        <button onclick="saveBot()" class="btn-primary" style="background:var(--admin-color);">حفظ إعدادات البوت</button>
    </div>

    <div class="glass-container" style="padding:20px; margin-bottom:15px; border-right:5px solid var(--events-color);">
        <h4><i class="fas fa-wallet"></i> إضافة وسائل الإيداع يدوياً</h4>
        <input type="text" id="payName" placeholder="اسم الوسيلة (مثلاً: USDT TRC20)">
        <input type="text" id="payAddr" placeholder="العنوان أو المحفظة">
        <button onclick="addPayment()" class="btn-primary" style="background:var(--events-color); color:black;">إضافة وسيلة دفع</button>
    </div>

    <div class="glass-container section-trade" style="padding:20px; margin-bottom:15px;">
        <h4><i class="fas fa-plus"></i> إضافة باقات الاستثمار</h4>
        <input type="number" id="pPrice" placeholder="سعر الباقة">
        <input type="number" id="pProfit" placeholder="الربح المتوقع">
        <button onclick="addPlan()" class="btn-primary" style="background:var(--trade-color); color:black;">إضافة الباقة للجمهور</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g", databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com", projectId: "matrix-c2" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveBot() {
            const token = document.getElementById('botToken').value;
            const user = document.getElementById('botUsername').value;
            db.ref('settings/bot').set({ token, user }).then(() => alert("✅ تم حفظ البوت"));
        }

        function addPayment() {
            const name = document.getElementById('payName').value;
            const addr = document.getElementById('payAddr').value;
            db.ref('settings/payments/' + name).set(addr).then(() => alert("✅ تمت إضافة وسيلة الدفع"));
        }

        function addPlan() {
            const price = document.getElementById('pPrice').value;
            const profit = document.getElementById('pProfit').value;
            db.ref('settings/plans').push({ price, profit }).then(() => alert("✅ تمت إضافة الباقة"));
        }
    </script>
</body>
</html>
