<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT GLOBAL | تسجيل مستثمر جديد</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #welcomeNote { height: 0; opacity: 0; transition: 0.5s; overflow: hidden; text-align: center; color: #b2ff59; font-size: 14px; font-weight: bold; }
        .active-note { height: 30px !important; opacity: 1 !important; margin-bottom: 10px; }
    </style>
</head>
<body class="main-bg">

    <div class="glass-container" style="max-width: 450px; padding: 35px; position: relative;">
        
        <a href="https://t.me/l_I_Z_N" target="_blank" style="position: absolute; top: 20px; left: 20px; color: #0088cc; font-size: 24px; text-decoration: none;">
            <i class="fab fa-telegram"></i>
        </a>

        <div style="text-align: center; margin-bottom: 25px;">
            <h1 class="logo-text">AMT <span>GLOBAL</span></h1>
            <p style="color: rgba(255,255,255,0.4); font-size: 11px;">منصة الاستثمار الرقمي الموثوقة</p>
        </div>

        <div id="welcomeNote"></div>

        <form id="registerForm">
            <div class="input-group">
                <i class="fas fa-id-card" style="position: absolute; margin: 15px; color: var(--trade-color);"></i>
                <input type="text" id="regName" placeholder="الاسم الكامل" required style="padding-right: 45px;" oninput="updateWelcome(this.value)">
            </div>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="countryCode" style="width:40%; background:rgba(0,0,0,0.3); color:white; border-radius:12px; border:1px solid rgba(255,255,255,0.1); font-size: 13px;">
                    <option value="213">🇩🇿 الجزائر (+213)</option>
                    <option value="20">🇪🇬 مصر (+20)</option>
                    <option value="966">🇸🇦 السعودية (+966)</option>
                </select>
                <input type="tel" id="regPhone" placeholder="رقم الهاتف" required style="margin-bottom:0; width: 60%;">
            </div>

            <div class="input-group">
                <i class="fas fa-fingerprint" style="position: absolute; margin: 15px; color: var(--trade-color);"></i>
                <input type="password" id="regPass" placeholder="تعيين كلمة السر" required style="padding-right: 45px;">
            </div>

            <button type="submit" id="submitBtn" class="btn-primary" style="background: linear-gradient(90deg, #00c853, #b2ff59); color: black;">
                <i class="fas fa-shield-alt"></i> تفعيل المحفظة والبدء
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p style="font-size: 12px; color: #fff;">لديك حساب؟ <a href="login.html" style="color: #b2ff59; text-decoration: none;">سجل دخولك</a></p>
        </div>

        <div style="margin-top: 30px; text-align: center;">
            <span id="adminSecret" style="font-size: 8px; color: rgba(255,255,255,0.1); cursor: pointer;">SECURED BY MATRIX v9.0.1</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g",
            databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com",
            projectId: "matrix-c2"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // تحديث الترحيب الحي بالاسم
        function updateWelcome(val) {
            const note = document.getElementById('welcomeNote');
            if(val.length > 2) {
                note.innerText = `أهلاً بك يا ${val} في منصة الاستثمار الرقمية!`;
                note.classList.add('active-note');
            } else {
                note.classList.remove('active-note');
            }
        }

        // الباب السري للأدمن
        let clickCount = 0;
        document.getElementById('adminSecret').onclick = function() {
            clickCount++;
            if (clickCount === 6) {
                const p = prompt("أدخل مفتاح العبور:");
                if (p === "2299.99.220077") window.location.href = "admin_panel.html";
                else clickCount = 0;
            }
        };

        // معالجة التسجيل
        document.getElementById('registerForm').onsubmit = (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-sync fa-spin"></i> جاري ربط البيانات...';
            btn.disabled = true;

            const userID = document.getElementById('countryCode').value + document.getElementById('regPhone').value.trim();
            const rawName = document.getElementById('regName').value;
            
            db.ref('users/' + userID).set({
                full_name: MatrixCrypto.encrypt(rawName),
                password: MatrixCrypto.encrypt(document.getElementById('regPass').value),
                balance: 0.00,
                trading_balance: 0.00,
                status: "active",
                plans_count: 0, // لزيادة إحصائيات الباقات مستقبلاً
                joined_at: new Date().getTime()
            }).then(() => {
                localStorage.setItem('userPhone', userID);
                window.location.href = "dashboard.html";
            }).catch(err => {
                alert("خطأ: " + err.message);
                btn.disabled = false;
                btn.innerHTML = 'تفعيل المحفظة والبدء';
            });
        };
    </script>
</body>
</html>
